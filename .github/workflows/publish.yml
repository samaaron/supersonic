name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Setup esbuild
        run: npm install -g esbuild

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: '4.0.21'
          actions-cache-folder: 'emsdk-cache'

      - name: Setup Rust (wasm32 target for the MIDI module)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.122

      - name: Build (release mode)
        run: ./scripts/build-web.sh --release

      - name: Install npm dependencies
        run: npm install

      - name: Run type tests
        run: npm run test:types

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      # Publishing is irreversible, so hold here until every other check run on
      # this commit is green — the native matrix (tag + main refs) and the web
      # Build-Test-Deploy all attach to the same SHA. Our own check run is
      # excluded by its job name. Cancelled or failed runs block the publish;
      # re-run them to green (or re-push the tag) to release.
      - name: Wait for all other CI on this commit to be green
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          for attempt in $(seq 1 240); do
            if ! all=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?per_page=100" --paginate \
                         --jq '.check_runs[] | select(.name != "publish") | [.status, (.conclusion // "-"), .name] | @tsv'); then
              echo "check-runs API error; retrying"
              sleep 30
              continue
            fi
            bad=$(printf '%s\n' "$all" | awk -F'\t' '$1=="completed" && $2!="success" && $2!="neutral" && $2!="skipped"')
            pending=$(printf '%s\n' "$all" | awk -F'\t' '$1!="completed"')
            if [ -n "$bad" ]; then
              echo "Not publishing — non-green check runs on ${GITHUB_SHA}:"
              printf '%s\n' "$bad"
              exit 1
            fi
            if [ -n "$all" ] && [ -z "$pending" ]; then
              echo "All other check runs green:"
              printf '%s\n' "$all"
              exit 0
            fi
            echo "Attempt ${attempt}/240 — still waiting on:"
            printf '%s\n' "${pending:-<no check runs reported yet>}"
            sleep 30
          done
          echo "Timed out after 2h waiting for CI to complete"
          exit 1

      - name: Generate npm README
        run: cp README.npm.md README.md

      - name: Publish supersonic-scsynth
        run: npm publish

      - name: Publish supersonic-scsynth-core
        working-directory: packages/supersonic-scsynth-core
        run: npm publish

      - name: Publish supersonic-scsynth-synthdefs
        working-directory: packages/supersonic-scsynth-synthdefs
        run: npm publish

      - name: Publish supersonic-scsynth-samples
        working-directory: packages/supersonic-scsynth-samples
        run: npm publish

      - name: Publish supersonic-scsynth-bundle
        working-directory: packages/supersonic-scsynth-bundle
        run: npm publish

      - name: Replace symlinks with actual files for distribution
        run: |
          echo "Removing symlinks and copying actual files..."
          rm -f dist/synthdefs dist/samples

          echo "Copying all synthdefs..."
          mkdir -p dist/synthdefs
          cp -r packages/supersonic-scsynth-synthdefs/synthdefs/* dist/synthdefs/
          echo "Copied $(ls -1 dist/synthdefs/*.scsyndef | wc -l) synthdef files"

          echo "Copying all samples..."
          mkdir -p dist/samples
          cp -r packages/supersonic-scsynth-samples/samples/* dist/samples/
          echo "Copied $(ls -1 dist/samples/ | wc -l) sample files"

      - name: Create zip archive
        run: |
          mkdir -p supersonic
          cp -r dist/* supersonic/
          rm -rf supersonic/.github-pages
          VERSION="${GITHUB_REF_NAME:-dev}"
          sed "s/{{VERSION}}/$VERSION/" docs/README.dist.md > supersonic/README.md
          zip -r supersonic-dist.zip supersonic
          rm -rf supersonic

      - name: Prepare release assets
        run: |
          VERSION="${{ github.ref_name }}"
          cp supersonic-dist.zip "supersonic-${VERSION}.zip"
          cp supersonic-dist.zip supersonic.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            supersonic-${{ github.ref_name }}.zip
            supersonic.zip
          generate_release_notes: true

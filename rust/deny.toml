# cargo-deny license gate. The Rust subsystems and their dependency tree must be
# permissively licensed (the dual-licensed first-party crates resolve to MIT via
# the OR). Run: cargo deny --manifest-path rust/Cargo.toml check licenses
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
# No crates excluded by name; the license allow-list above is the policy.

[advisories]
# License-focused check; advisories handled separately.
ignore = []
